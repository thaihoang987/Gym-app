services:
  gym-app:
    build: .
    image: gym-app:latest
    container_name: gym-app
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3001
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - TZ=${TZ:-America/New_York}
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
